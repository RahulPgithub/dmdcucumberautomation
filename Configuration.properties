# DMD Features Service Configuration
dmd.features.service.base.url=http://localhost:8080
dmd.features.service.api.version=/api/v1
dmd.features.service.get.endpoint=/features
dmd.features.service.post.endpoint=/features/create

# DMD DeviceInfo Service Configuration
dmd.deviceinfo.service.base.url=http://localhost:8081
dmd.deviceinfo.service.api.version=/api/v1
dmd.deviceinfo.service.get.endpoint=/deviceinfo
dmd.deviceinfo.service.post.endpoint=/deviceinfo/create

# API Configuration
api.timeout=30
api.connection.timeout=15
api.socket.timeout=15

# Request/Response Configuration
request.content.type=application/xml
response.content.type=application/json

# Logging
logging.level=DEBUG

# Reporting
report.output.path=./reports
